name: Build Bun App
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest  # image linux
    steps:
      - uses: actions/checkout@v4
       
      - name: Setup Bun # pake bun buat compile js/ts ke executable
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Executable #build
        run: bun build ./index.ts --compile --outfile pythagoras-linux

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: my-executable
          path: pythagoras-linux