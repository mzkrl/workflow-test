name: Build Bun App
on:
  push:
    branches: [ master ]
    tags:
      - 'v*' # Trigger jalan kalau lo push tag seperti v1.0, v2.1, dll.

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
       
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Executable
        run: |
          bun build ./index.ts --compile --target bun-linux-x64 --outfile pythagoras-linux
          bun build ./index.ts --compile --target bun-windows-x64 --outfile pythagoras-win.exe

      # --- STEP BARU: KOMPRESI ---
      - name: Compress Binaries with UPX
        uses: upx-gh-actions/upx-action@v1
        with:
          files: |
            pythagoras-linux
            pythagoras-win.exe
          args: -9 # Level kompresi maksimal (1-9)
      # ---------------------------
          
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pythagoras-apps
          path: |
            pythagoras-linux
            pythagoras-win.exe
            
      # 1. Ini bakal jalan HANYA kalau kamu push TAG (v1.0.0, dll)
      - name: Create Versioned Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            pythagoras-linux
            pythagoras-win.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. Ini bakal jalan SETIAP KALI kamu push ke branch master (tanpa tag)
      - name: Update Latest Release 
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Continuous Build"
          body: "Build otomatis dari commit terakhir di branch master."
          prerelease: true # Biar ada label 'Pre-release' di GitHub
          files: |
            pythagoras-linux
            pythagoras-win.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}